# Server
server.port=8080
server.servlet.context-path=/transfer-backend

# Database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

# Multipart — 10 GB ceiling
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10240MB
spring.servlet.multipart.max-request-size=10240MB

# App
app.max-file-size-mb=10240
app.jwt-secret=${JWT_SECRET}
app.cookie-secure=${COOKIE_SECURE:false}
app.upload-dir=${UPLOAD_DIR}

# AWS SES
aws.ses.region=${AWS_REGION:ap-south-1}
aws.ses.from-email=${AWS_FROM_EMAIL}
